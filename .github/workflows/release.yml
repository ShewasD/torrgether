name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - name: Bundle MPV runtime
        shell: pwsh
        run: .\build\install-mpv.ps1 -InstallDir "$PWD" -SevenZipPath ".\node_modules\7zip-bin\win\x64\7za.exe" -Force
      - run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run dist:linux
      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/*.AppImage
            dist/*.deb

  publish:
    needs:
      - build-windows
      - build-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release-assets/**/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "Torrgether $GITHUB_REF_NAME" \
            --notes "Automated Torrgether release with Windows installer, AppImage, and deb packages."
